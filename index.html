<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aidan Serik</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #0d0d12;
  color: #eaeaf0;
  font-family: Inter, sans-serif;
  overflow-x: hidden;
}

/* GRAIN */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: url('https://grainy-gradients.vercel.app/noise.svg');
  opacity: 0.07;
  pointer-events: none;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  padding: 80px;
}

.hero h1 {
  font-size: 9vw;
  line-height: 0.9;
  font-weight: 600;
}

.hero span {
  color: #a78bfa;
}

/* FILM STRIP */
.film-strip {
  display: flex;
  overflow-x: auto;
  gap: 40px;
  padding: 80px;
}

.film-card {
  min-width: 400px;
  position: relative;
}

.film-card img {
  width: 100%;
  border-radius: 20px;
  filter: contrast(1.1);
}

.film-card::before {
  content: "";
  position: absolute;
  inset: -10px;
  border: 2px dashed rgba(255,255,255,0.2);
  border-radius: 20px;
}

/* WORK GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  padding: 80px;
}

.work {
  cursor: pointer;
}

.work img {
  width: 100%;
  border-radius: 12px;
}

.work h3 {
  margin-top: 12px;
  font-size: 18px;
}

/* ABOUT */
.about {
  padding: 120px 80px;
  display: flex;
  gap: 60px;
}

.about img {
  width: 300px;
  border-radius: 10px;
}

.about-text {
  max-width: 500px;
}

/* CONTACT */
.contact {
  padding: 120px 80px;
}

.contact a {
  display: block;
  color: #a78bfa;
  margin-top: 10px;
}

/* NAV */
nav {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 20px;
}

nav a {
  padding: 10px 20px;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 30px;
  text-decoration: none;
  color: white;
}

nav a:hover {
  background: #a78bfa;
  color: black;
}

/* FILM FLICKER */
@keyframes flicker {
  0%,100% { opacity: 1; }
  50% { opacity: 0.98; }
}

body {
  animation: flicker 4s infinite;
}
</style>
</head>

<body>

<section class="hero">
  <h1>
    AIDAN<br>
    <span>SERIK</span><br><br>
    FILM EDITOR<br>
    & DIRECTOR
  </h1>
</section>

<section class="film-strip">
  <div class="film-card">
    <img src="aidan-portrait.JPG">
  </div>
  <div class="film-card">
    <img src="aidan-portrait.JPG">
  </div>
  <div class="film-card">
    <img src="aidan-portrait.JPG">
  </div>
</section>

<section class="grid">
  <div class="work">
    <img src="aidan-portrait.JPG">
    <h3>Women in Lenovo — 2019</h3>
  </div>

  <div class="work">
    <img src="aidan-portrait.JPG">
    <h3>Adren CS:GO — 2019</h3>
  </div>
</section>

<section class="about">
  <img src="aidan-portrait.JPG">
  <div class="about-text">
    <h2>Aidan Serik</h2>
    <p>Based in Tbilisi & Almaty. Working worldwide.</p>
    <br>
    <p>Editor / Director focused on documentary and narrative storytelling.</p>
  </div>
</section>

<section class="contact">
  <h2>Contact</h2>
  <a href="#">Email</a>
  <a href="#">Instagram</a>
  <a href="#">Vimeo</a>
</section>

<nav>
  <a href="#">Home</a>
  <a href="#">Work</a>
  <a href="#">About</a>
  <a href="#">Contact</a>
</nav>

</body>
</html>
