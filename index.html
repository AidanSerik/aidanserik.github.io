<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aidan Serik — Film Editor</title>

<style>
body {
  margin: 0;
  background: #0a0a0a;
  color: #f5f5f5;
  font-family: Arial, sans-serif;
}

header {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 20px;
  display: flex;
  justify-content: space-between;
  background: rgba(0,0,0,0.7);
}

.grid {
  margin-top: 120px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  border: 1px solid #333;
  cursor: pointer;
}

.card img {
  width: 100%;
}

.info {
  padding: 10px;
}

.modal {
  position: fixed;
  inset: 0;
  background: black;
  display: none;
  padding: 40px;
}

.modal.active {
  display: block;
}

.close {
  position: absolute;
  top: 20px;
  right: 20px;
  cursor: pointer;
}
</style>

</head>

<body>

<header>
<div>Aidan Serik</div>
<div>Film Editor</div>
</header>

<div class="grid" id="grid"></div>

<div class="modal" id="modal">
<div class="close" onclick="closeModal()">✕</div>
<h1 id="title"></h1>
<p id="meta"></p>
<iframe id="video" width="100%" height="400"></iframe>
</div>

<script>

const projects = [
{
title: "Madina",
role: "Editor",
year: "2021",
poster: "madina-poster.jpg",
video: "https://www.youtube.com/embed/LZEonboLtXg"
},
{
title: "Joqtau",
role: "Editor",
year: "2022",
poster: "joqtau-poster.jpg",
video: "https://www.youtube.com/embed/LZEonboLtXg"
},
{
title: "DYAD",
role: "Director",
year: "2023",
poster: "dyad-poster.jpg",
video: "https://www.youtube.com/embed/LZEonboLtXg"
}
];

const grid = document.getElementById("grid");

projects.forEach(function(p) {

const card = document.createElement("div");
card.className = "card";

card.innerHTML =
'<img src="'+p.poster+'">' +
'<div class="info">' +
'<h3>'+p.title+'</h3>' +
'<p>'+p.role+' / '+p.year+'</p>' +
'</div>';

card.onclick = function() {
openModal(p);
};

grid.appendChild(card);

});

function openModal(p) {
document.getElementById("modal").classList.add("active");
document.getElementById("title").innerText = p.title;
document.getElementById("meta").innerText = p.role + " / " + p.year;
document.getElementById("video").src = p.video;
}

function closeModal() {
document.getElementById("modal").classList.remove("active");
document.getElementById("video").src = "";
}

</script>

</body>
</html>
