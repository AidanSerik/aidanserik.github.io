<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aidan Serik</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root{
  --blue:#6C8EBF;
  --bg:#0b0c0f;
  --text:#eaeaea;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  background:var(--bg);
  color:var(--text);
  font-family:Inter;
  overflow-x:hidden;
}

/* NAV */

nav{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  z-index:100;
  backdrop-filter:blur(10px);
}

nav a{
  color:white;
  margin-left:20px;
  text-decoration:none;
  opacity:.7;
}
nav a:hover{opacity:1}

/* HERO */

.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  text-align:center;
}

.hero h1{
  font-size:80px;
  font-family:Playfair Display;
  z-index:2;
}

.hero video{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:.4;
}

/* GRID */

.section{
  padding:120px 10%;
}

.section h2{
  margin-bottom:40px;
  font-size:28px;
  font-family:Playfair Display;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
}

.card{
  position:relative;
  cursor:pointer;
  overflow:hidden;
  border-radius:14px;
}

.card img{
  width:100%;
  display:block;
  transition:.5s;
}

.card:hover img{
  transform:scale(1.05);
}

.card span{
  position:absolute;
  bottom:20px;
  left:20px;
  font-size:14px;
  opacity:.8;
}

/* MODAL */

.modal{
  position:fixed;
  inset:0;
  background:#000;
  display:none;
  justify-content:center;
  align-items:center;
  padding:40px;
  z-index:999;
}

.modal.active{display:flex}

.modal-content{
  max-width:900px;
  width:100%;
}

.modal video{
  width:100%;
  margin-bottom:20px;
}

.close{
  position:absolute;
  top:20px;
  right:30px;
  font-size:30px;
  cursor:pointer;
}

/* film grain */

body::after{
  content:"";
  position:fixed;
  inset:0;
  background:url('https://grainy-gradients.vercel.app/noise.svg');
  opacity:.05;
  pointer-events:none;
}

</style>
</head>

<body>

<nav>
  <div>Aidan Serik</div>
  <div>
    <a href="#">Home</a>
    <a href="#">Works</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </div>
</nav>

<!-- HERO -->

<section class="hero">
  <video autoplay muted loop src="we-live-here-preview.mp4"></video>
  <h1>Aidan Serik</h1>
</section>

<!-- WORKS -->

<section class="section">
  <h2>Selected Works</h2>

  <div class="grid">

    <!-- WE LIVE HERE -->
    <div class="card" onclick="openModal('we-live')">
      <img src="we-live-here-poster.jpg">
      <span>We Live Here</span>
    </div>

    <!-- MADINA -->
    <div class="card" onclick="openModal('madina')">
      <img src="madina-poster.jpg">
      <span>Madina</span>
    </div>

    <!-- JOQTAU -->
    <div class="card" onclick="openModal('joqtau')">
      <img src="joqtau-poster.jpg">
      <span>Joqtau</span>
    </div>

    <!-- DYAD -->
    <div class="card" onclick="openModal('dyad')">
      <img src="dyad-poster.jpg">
      <span>DYAD</span>
    </div>

    <!-- LET HER DANCE -->
    <div class="card" onclick="openModal('dance')">
      <img src="letherdance-poster.jpg">
      <span>Let Her Dance</span>
    </div>

    <!-- PRESENCE -->
    <div class="card" onclick="openModal('presence')">
      <img src="presence-poster.jpg">
      <span>Presence</span>
    </div>

    <!-- PRYANIKI -->
    <div class="card" onclick="openModal('pryaniki')">
      <img src="pryaniki-poster.jpg">
      <span>Gingerbread for Her Dad</span>
    </div>

  </div>
</section>

<!-- MODAL -->

<div class="modal" id="modal">
  <div class="close" onclick="closeModal()">✕</div>
  <div class="modal-content" id="modalContent"></div>
</div>

<script>

function openModal(project){

let content = ""

if(project==="we-live"){
content=`
<video controls src="we-live-here-preview.mp4"></video>
<p>Feature documentary.</p>
<p><a href="https://variety.com/2025/film/global/we-live-here-syndicado-cphdox-1236328082/" target="_blank">Press</a></p>
`
}

if(project==="madina"){
content=`
<img src="madina-poster.jpg" style="width:100%">
<p>Feature film.</p>
<p><a href="https://variety.com/2023/film/asia/tokyo-all-woman-crew-kazakh-madina-patriarchy-1235764762/" target="_blank">Press</a></p>
`
}

if(project==="joqtau"){
content=`
<video controls src="joqtau-preview.mp4"></video>
<p>Feature film.</p>
<p><a href="https://variety.com/2024/film/global/parallax-joqtau-washhh-locarno-1236092474/" target="_blank">Press</a></p>
`
}

if(project==="dyad"){
content=`
<video controls src="trippin-preview.mp4"></video>
<p>Short film.</p>
<p><a href="https://www.imdb.com/name/nm16334791/" target="_blank">Press</a></p>
`
}

if(project==="dance"){
content=`
<video controls src="letherdance-preview.mp4"></video>
<p>Visual film.</p>
`
}

if(project==="presence"){
content=`
<img src="presence-poster.jpg" style="width:100%">
<p>Visual project.</p>
`
}

if(project==="pryaniki"){
content=`
<img src="pryaniki-poster.jpg" style="width:100%">
<p>Short film.</p>
<p><a href="https://thefilmverdict.com/gingerbread-for-her-dad/" target="_blank">Press</a></p>
`
}

document.getElementById("modalContent").innerHTML=content
document.getElementById("modal").classList.add("active")
}

function closeModal(){
document.getElementById("modal").classList.remove("active")
}

</script>

</body>
</html>
